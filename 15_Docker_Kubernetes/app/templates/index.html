<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask App - Animated</title>
    <style>
        /* Modern background with a subtle gradient */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a40 100%);
            color: white;
            overflow: hidden;
        }

        /* The Main Card with Animation */
        .card { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
            padding: 3rem; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            
            /* Apply the Entry Animation */
            animation: fadeInUp 1s ease-out forwards;
        }

        h1 { 
            color: #2ecc71; 
            font-size: 3rem;
            margin-bottom: 0.5rem;
            /* Text pulse animation */
            animation: pulse 2s infinite;
        }

        p { 
            font-size: 1.2rem; 
            color: #d1d1d1;
            line-height: 1.6;
        }

        b { color: #5dade2; }

        /* Keyframes for the card sliding up */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Keyframes for the "Success" pulse */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); text-shadow: 0 0 15px rgba(46, 204, 113, 0.5); }
            100% { transform: scale(1); }
        }

        /* Optional: Floating background particles effect */
        .bg-blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(46, 204, 113, 0.1);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 80px); }
        }
    </style>
</head>
<body>
    <div class="bg-blob"></div>
    <div class="card">
        <h1>Success!</h1>
        <p>Your Flask app is running inside <b>Docker</b> <br> using <b>uv</b> and <b>Gunicorn</b>.</p>
    </div>
</body>
</html>
