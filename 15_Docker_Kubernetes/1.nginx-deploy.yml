apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app-deployment
  labels:
    app: flask-web
spec:
  replicas: 2  # Runs two instances of your app for redundancy
  selector:
    matchLabels:
      app: flask-web
  template:
    metadata:
      labels:
        app: flask-web
    spec:
      containers:
      - name: flask-container
        # Replace 'your-docker-username' with your actual Docker Hub username
        # or the name you used when building: flask-uv-app:latest
        image: myapp
        ports:
        - containerPort: 5000
        imagePullPolicy: IfNotPresent # Useful for local clusters like kind
